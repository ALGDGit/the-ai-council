# Crea un GitHub Release al pushear un tag v1.2.3 (zip + .exe single-file)
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish folder (para el .zip)
        run: >
          dotnet publish TheIACouncil/TheIACouncil.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o ./artifacts/TheIACouncil

      - name: Publish single-file .exe
        run: >
          dotnet publish TheIACouncil/TheIACouncil.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./artifacts/single

      - name: Preparar zip y .exe con nombre de versión
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          Compress-Archive -Path ./artifacts/TheIACouncil/* -DestinationPath "./TheIACouncil-$ver-win-x64.zip" -Force
          Copy-Item ./artifacts/single/TheIACouncil.exe "./TheIACouncil-$ver.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TheIACouncil-${{ github.ref_name }}-win-x64.zip
            TheIACouncil-${{ github.ref_name }}.exe
          generate_release_notes: true
