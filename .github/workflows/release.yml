# Crea un GitHub Release con el binario de Windows al pushear un tag v1.2.3
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish (framework-dependent, win-x64)
        run: >
          dotnet publish TheIACouncil/TheIACouncil.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o ./artifacts/TheIACouncil

      - name: Zip artifact
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}"
          Compress-Archive -Path ./artifacts/TheIACouncil/* -DestinationPath "./TheIACouncil-$ver-win-x64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TheIACouncil-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
